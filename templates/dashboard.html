<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

  <!-- Welcome -->
  <h2 class="mb-4">Welcome {{ user }}</h2>

  <!-- Upload Section -->
  <div class="card p-3 mb-4">
    <h4>Upload File</h4>
    <form action="/upload" method="POST" enctype="multipart/form-data">
      <input class="form-control mb-2" type="file" name="file" required>
      <button class="btn btn-primary">Upload</button>
    </form>
  </div>

  <!-- Files Section -->
  <div class="card p-3">
    <h4>Your Files</h4>

    <ul class="list-group mt-3">
      {% for file in files %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          
          <div>
            <strong>{{ file['filename'] }}</strong><br>
            <small class="text-muted">{{ file['uploaded_at'] }}</small>
          </div>

          <a href="/download/{{ file['id'] }}" class="btn btn-sm btn-success">
            Download
          </a>

        </li>
      {% else %}
        <li class="list-group-item">No files uploaded yet</li>
      {% endfor %}
    </ul>

  </div>

</div>

</body>
</html>
